<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clan Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
  <div class="container" style="max-width: 980px;">
    <h1 class="mb-1">Clan Dashboard</h1>
    <p class="text-muted mb-4">Members + Power/Level (saved in Firebase Firestore)</p>

    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3">Add / Update Member</h5>

        <!-- hidden: keeps track of what you're editing (optional, but useful) -->
        <input type="hidden" id="editing_id" value="">

        <div class="row g-2 align-items-start">
          <div class="col-md-3">
            <input id="member_id" class="form-control" placeholder="id (unique)" />
            <div class="form-text">Use simple IDs: kaede, ringo, jordi</div>
          </div>
          <div class="col-md-3">
            <input id="member_name" class="form-control" placeholder="name (can be Ringo 星)" />
          </div>
          <div class="col-md-2">
            <input id="member_level" type="number" class="form-control" placeholder="level" />
          </div>
          <div class="col-md-2">
            <input id="member_power" type="number" class="form-control" placeholder="power" />
          </div>
          <div class="col-md-2 d-grid">
            <button id="save_btn" class="btn btn-primary">Save</button>
          </div>
        </div>

        <div id="status" class="small mt-3 text-muted"></div>
      </div>
    </div>

   <div class="d-flex justify-content-between align-items-center mb-2">
  <h2 class="h4 m-0">Members</h2>
  <div class="d-flex gap-2">
    <a class="btn btn-outline-secondary btn-sm" href="grouping.html">Grouping</a>
    <a class="btn btn-outline-secondary btn-sm" href="valley_war.html">Valley War</a>
  </div>
</div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>ID</th>
            <th>Level</th>
            <th>Power</th>
            <th>Updated</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="members_tbody"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, doc, setDoc, deleteDoc, collection, query, orderBy, onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyANkanSC5HJI3qI4z2CY-0zif_d8nocCTQ",
      authDomain: "shambhala-bdbb5.firebaseapp.com",
      projectId: "shambhala-bdbb5",
      storageBucket: "shambhala-bdbb5.firebasestorage.app",
      messagingSenderId: "420071179202",
      appId: "1:420071179202:web:72c23bd0f76b7c9b87cc5b",
      measurementId: "G-4EN2NM7J1Z"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = "small mt-3 " + (isError ? "text-danger" : "text-muted");
    }

    // Save / Update
    $("save_btn").addEventListener("click", async () => {
      const id = $("member_id").value.trim();
      const name = $("member_name").value.trim();
      const levelRaw = $("member_level").value.trim();
      const powerRaw = $("member_power").value.trim();

      if (!id || !name) return setStatus("Need at least id + name.", true);

      const level = levelRaw === "" ? null : Number(levelRaw);
      const power = powerRaw === "" ? null : Number(powerRaw);

      try {
        await setDoc(doc(db, "members", id), {
          name,
          level,
          power,
          updatedAt: Date.now()
        }, { merge: true });

        // clear form
        $("editing_id").value = "";
        $("member_id").value = "";
        $("member_name").value = "";
        $("member_level").value = "";
        $("member_power").value = "";
        setStatus("Saved ✅");
      } catch (e) {
        console.error(e);
        setStatus("Save failed: " + e.message, true);
      }
    });

    // Live list (sorted by power desc)
    const membersQ = query(collection(db, "members"), orderBy("power", "desc"));

    onSnapshot(membersQ, (snap) => {
      const tbody = $("members_tbody");
      tbody.innerHTML = "";

      snap.forEach((d) => {
        const m = d.data();
        const tr = document.createElement("tr");
        const dt = m.updatedAt ? new Date(m.updatedAt).toLocaleString() : "";

        tr.innerHTML = `
          <td class="fw-semibold">${m.name ?? ""}</td>
          <td class="text-muted">${d.id}</td>
          <td>${m.level ?? ""}</td>
          <td class="fw-semibold">${m.power ?? ""}</td>
          <td class="text-muted small">${dt}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-primary me-2 edit-btn">Edit</button>
            <button class="btn btn-sm btn-outline-danger delete-btn">Delete</button>
          </td>
        `;

        // Edit -> loads data into form
        tr.querySelector(".edit-btn").addEventListener("click", () => {
          $("editing_id").value = d.id;
          $("member_id").value = d.id;
          $("member_name").value = m.name ?? "";
          $("member_level").value = (m.level ?? "");
          $("member_power").value = (m.power ?? "");
          setStatus("Editing: " + d.id);
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        // Delete -> removes doc
        tr.querySelector(".delete-btn").addEventListener("click", async () => {
          const ok = confirm(`Delete member "${m.name ?? d.id}" (${d.id})?`);
          if (!ok) return;

          try {
            await deleteDoc(doc(db, "members", d.id));
            setStatus("Deleted ✅");
          } catch (e) {
            console.error(e);
            setStatus("Delete failed: " + e.message, true);
          }
        });

        tbody.appendChild(tr);
      });

      setStatus("Loaded members ✅");
    }, (err) => {
      console.error(err);
      setStatus("Realtime load failed: " + err.message, true);
    });
  </script>
</body>
</html>
