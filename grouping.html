<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clan Dashboard - Grouping</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
  <div class="container" style="max-width: 1100px;">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div>
        <h1 class="mb-1">Auto Grouping</h1>
        <p class="text-muted m-0">Groups are based on power score.</p>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="index.html">Back to Roster</a>
        <button id="save_groups" class="btn btn-primary">Save groups for Valley War</button>
      </div>
    </div>

    <div id="status" class="small text-muted my-3"></div>

    <div id="groups_container"></div>

    <div class="text-muted small mt-3">
      Bucket rules (edit if you want):<br>
      &lt;200k → below 200k, 200k–249,999 → 200k, 250k–299,999 → 250k, 300k–349,999 → 300k,
      350k–399,999 → 350k, ≥400k → 400k
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyANkanSC5HJI3qI4z2CY-0zif_d8nocCTQ",
      authDomain: "shambhala-bdbb5.firebaseapp.com",
      projectId: "shambhala-bdbb5",
      storageBucket: "shambhala-bdbb5.firebasestorage.app",
      messagingSenderId: "420071179202",
      appId: "1:420071179202:web:72c23bd0f76b7c9b87cc5b",
      measurementId: "G-4EN2NM7J1Z"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const groupsContainer = $("groups_container");

    function setStatus(msg, isError=false) {
      statusEl.textContent = msg;
      statusEl.className = "small my-3 " + (isError ? "text-danger" : "text-muted");
    }

    // ---- Buckets ----
    const BUCKETS = [
      { id: "below_200k", label: "below 200k" },
      { id: "200k", label: "200k" },
      { id: "250k", label: "250k" },
      { id: "300k", label: "300k" },
      { id: "350k", label: "350k" },
      { id: "400k", label: "400k" }
    ];

    function bucketFromPower(power) {
      if (power == null || Number.isNaN(power)) return "below_200k";
      if (power < 200000) return "below_200k";
      if (power < 250000) return "200k";
      if (power < 300000) return "250k";
      if (power < 350000) return "300k";
      if (power < 400000) return "350k";
      return "400k";
    }

    // State for saving
    let latestGroups = {}; // bucketId -> array of member ids

    function render(groups, membersById) {
      groupsContainer.innerHTML = "";

      for (const b of BUCKETS) {
        const ids = groups[b.id] ?? [];
        const title = `${b.label} (${ids.length})`;

        const section = document.createElement("div");
        section.className = "mb-4";

        section.innerHTML = `
          <h3 class="h5 mb-2">${title}</h3>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-dark">
                <tr>
                  <th>Name</th>
                  <th>ID</th>
                  <th>Level</th>
                  <th>Power</th>
                  <th>Updated</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        `;

        const tbody = section.querySelector("tbody");

        // sort by power desc
        const rows = ids
          .map(id => membersById.get(id))
          .filter(Boolean)
          .sort((a,b2) => (b2.power ?? -Infinity) - (a.power ?? -Infinity));

        for (const m of rows) {
          const dt = m.updatedAt ? new Date(m.updatedAt).toLocaleString() : "";
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="fw-semibold">${m.name ?? ""}</td>
            <td class="text-muted">${m.id}</td>
            <td>${m.level ?? ""}</td>
            <td class="fw-semibold">${m.power ?? ""}</td>
            <td class="text-muted small">${dt}</td>
          `;
          tbody.appendChild(tr);
        }

        groupsContainer.appendChild(section);
      }
    }

    async function saveGroups() {
      // Saves to Firestore collection: categories
      // categories/{bucketId} = { memberIds: [...], updatedAt: ... }
      const ts = Date.now();
      const writes = BUCKETS.map(b => {
        const ref = doc(db, "categories", b.id);
        const memberIds = latestGroups[b.id] ?? [];
        return setDoc(ref, { memberIds, updatedAt: ts }, { merge: true });
      });
      await Promise.all(writes);
    }

    $("save_groups").addEventListener("click", async () => {
      try {
        await saveGroups();
        setStatus("Saved groups to Firestore ✅");
      } catch (e) {
        console.error(e);
        setStatus("Save failed: " + e.message, true);
      }
    });

    // Live roster listener -> auto-group
    onSnapshot(collection(db, "members"), (snap) => {
      const membersById = new Map();
      const groups = {};
      for (const b of BUCKETS) groups[b.id] = [];

      snap.forEach((d) => {
        const data = d.data();
        const m = { id: d.id, ...data };
        membersById.set(m.id, m);

        const p = (m.power === "" || m.power == null) ? null : Number(m.power);
        const bucket = bucketFromPower(p);
        groups[bucket].push(m.id);
      });

      latestGroups = groups;
      render(groups, membersById);
      setStatus("Grouped members ✅");
    }, (err) => {
      console.error(err);
      setStatus("Load failed: " + err.message, true);
    });
  </script>
</body>
</html>
