<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clan Dashboard - Valley War</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
  <div class="container" style="max-width: 1100px;">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div>
        <h1 class="mb-1">Valley War Attendance</h1>
        <p class="text-muted m-0">Pick a date → tick attendees → save. Members are grouped by power score.</p>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="index.html">Back to Roster</a>
      </div>
    </div>

    <div id="status" class="small text-muted my-3"></div>

    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-md-4">
            <label class="form-label">Valley War Date</label>
            <input id="war_date" type="date" class="form-control" />
            <div class="form-text">Usually Wednesday. Choose the exact date you want.</div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Notes (optional)</label>
            <input id="war_notes" class="form-control" placeholder="e.g. pushed mid, 2nd place" />
          </div>

          <div class="col-md-4 d-flex gap-2">
            <button id="load_btn" class="btn btn-outline-primary w-100">Load / Create</button>
            <button id="save_btn" class="btn btn-primary w-100" disabled>Save Attendance</button>
          </div>
        </div>

        <div class="mt-3 d-flex flex-wrap gap-2">
          <span class="badge bg-dark" id="count_total">Total: 0</span>
          <span class="badge bg-success" id="count_checked">Attended: 0</span>
        </div>
      </div>
    </div>

    <div id="groups_container"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      getDoc,
      setDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyANkanSC5HJI3qI4z2CY-0zif_d8nocCTQ",
      authDomain: "shambhala-bdbb5.firebaseapp.com",
      projectId: "shambhala-bdbb5",
      storageBucket: "shambhala-bdbb5.firebasestorage.app",
      messagingSenderId: "420071179202",
      appId: "1:420071179202:web:72c23bd0f76b7c9b87cc5b",
      measurementId: "G-4EN2NM7J1Z"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);

    function setStatus(msg, isError=false) {
      const el = $("status");
      el.textContent = msg;
      el.className = "small my-3 " + (isError ? "text-danger" : "text-muted");
    }

    // --- Buckets (your exact logic) ---
    const BUCKETS = [
      { id: "below_200k", label: "below 200k" },
      { id: "200k", label: "200k" },
      { id: "250k", label: "250k" },
      { id: "300k", label: "300k" },
      { id: "350k", label: "350k" },
      { id: "400k", label: "400k" }
    ];

    function bucketFromPower(power) {
      if (power == null || Number.isNaN(power)) return "below_200k";
      if (power < 200000) return "below_200k";
      if (power < 250000) return "200k";
      if (power < 300000) return "250k";
      if (power < 350000) return "300k";
      if (power < 400000) return "350k";
      return "400k";
    }

    // --- State ---
    let roster = [];           // list of member objects
    let rosterMap = new Map(); // id -> member
    let currentAttendees = new Set(); // member ids checked
    let loadedDate = null;     // YYYY-MM-DD

    function updateCounts(total) {
      $("count_total").textContent = "Total: " + total;
      $("count_checked").textContent = "Attended: " + currentAttendees.size;
    }

    function buildGroups() {
      const groups = {};
      for (const b of BUCKETS) groups[b.id] = [];

      for (const m of roster) {
        const p = (m.power === "" || m.power == null) ? null : Number(m.power);
        const bucket = bucketFromPower(p);
        groups[bucket].push(m);
      }

      // sort each group by power desc
      for (const b of BUCKETS) {
        groups[b.id].sort((a, c) => (c.power ?? -Infinity) - (a.power ?? -Infinity));
      }

      return groups;
    }

    function render() {
      const container = $("groups_container");
      container.innerHTML = "";

      const groups = buildGroups();
      const totalMembers = roster.length;

      for (const b of BUCKETS) {
        const members = groups[b.id] ?? [];
        const section = document.createElement("div");
        section.className = "mb-4";

        section.innerHTML = `
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h3 class="h5 m-0">${b.label} <span class="text-muted">(${members.length})</span></h3>
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-dark">
                <tr>
                  <th style="width: 60px;">In</th>
                  <th>Name</th>
                  <th>ID</th>
                  <th>Level</th>
                  <th>Power</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        `;

        const tbody = section.querySelector("tbody");

        for (const m of members) {
          const tr = document.createElement("tr");

          const checked = currentAttendees.has(m.id);
          tr.innerHTML = `
            <td>
              <input class="form-check-input attend-check" type="checkbox" ${checked ? "checked" : ""}>
            </td>
            <td class="fw-semibold">${m.name ?? ""}</td>
            <td class="text-muted">${m.id}</td>
            <td>${m.level ?? ""}</td>
            <td class="fw-semibold">${m.power ?? ""}</td>
          `;

          const cb = tr.querySelector(".attend-check");
          cb.addEventListener("change", () => {
            if (cb.checked) currentAttendees.add(m.id);
            else currentAttendees.delete(m.id);
            updateCounts(totalMembers);
          });

          tbody.appendChild(tr);
        }

        container.appendChild(section);
      }

      updateCounts(totalMembers);
    }

    async function loadWar(dateStr) {
      // doc id = date (YYYY-MM-DD)
      const warRef = doc(db, "valleywars", dateStr);
      const warSnap = await getDoc(warRef);

      currentAttendees = new Set();
      $("war_notes").value = "";

      if (warSnap.exists()) {
        const data = warSnap.data();
        const ids = Array.isArray(data.attendees) ? data.attendees : [];
        for (const id of ids) currentAttendees.add(id);
        $("war_notes").value = data.notes ?? "";
        setStatus("Loaded existing attendance ✅");
      } else {
        setStatus("No record yet — tick members then Save ✅");
      }

      loadedDate = dateStr;
      $("save_btn").disabled = false;
      render();
    }

    async function saveWar() {
      if (!loadedDate) return setStatus("Pick a date and click Load/Create first.", true);

      const attendees = Array.from(currentAttendees);
      const notes = $("war_notes").value.trim();

      try {
        await setDoc(doc(db, "valleywars", loadedDate), {
          date: loadedDate,
          notes,
          attendees,
          updatedAt: Date.now()
        }, { merge: true });

        setStatus("Saved attendance ✅");
      } catch (e) {
        console.error(e);
        setStatus("Save failed: " + e.message, true);
      }
    }

    // Default date = today (you can just pick Wednesday)
    const today = new Date();
    $("war_date").value = today.toISOString().slice(0, 10);

    $("load_btn").addEventListener("click", async () => {
      const d = $("war_date").value;
      if (!d) return setStatus("Choose a date first.", true);
      await loadWar(d);
    });

    $("save_btn").addEventListener("click", async () => {
      await saveWar();
    });

    // Live roster
    onSnapshot(collection(db, "members"), (snap) => {
      roster = [];
      rosterMap = new Map();
      snap.forEach((d) => {
        const m = { id: d.id, ...d.data() };
        roster.push(m);
        rosterMap.set(m.id, m);
      });

      // keep roster stable
      roster.sort((a,b) => (b.power ?? -Infinity) - (a.power ?? -Infinity));

      // If a war is loaded, re-render with current roster
      render();
      setStatus(loadedDate ? "Roster updated ✅" : "Pick a date and click Load/Create.");
    }, (err) => {
      console.error(err);
      setStatus("Roster load failed: " + err.message, true);
    });
  </script>
</body>
</html>
